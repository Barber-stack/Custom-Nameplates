name: Build Plugin

on:
  workflow_dispatch:  # lets you trigger it manually with a button
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 and 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: |
            17
            21

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: CustomNameplates-jar
          path: platforms/bukkit/build/libs/*.jar
