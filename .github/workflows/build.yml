name: Build Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Xiao-MoMi/Custom-Nameplates
          fetch-depth: 0

      - name: Set up JDK 17 and 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: |
            17
            21

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Show project structure
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== settings.gradle.kts ==="
          cat settings.gradle.kts || echo "(not found)"
          echo "=== platforms directory ==="
          find platforms -maxdepth 2 -type f -name "*.gradle.kts"
          echo "=== Each platforms build file ==="
          for f in $(find platforms -maxdepth 2 -type f -name "*.gradle.kts"); do
            echo "--- $f ---"
            cat "$f"
          done
        continue-on-error: true
      - name: Configure git identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Build shaded jar
        run: ./gradlew shadowJar

      - name: List built jars
        run: find . -name "*.jar" -path "*/build/libs/*" -exec ls -lh {} \;

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: CustomNameplates-jar
          path: build/libs/CustomNameplates-all.jar
